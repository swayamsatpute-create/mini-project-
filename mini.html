<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atmos - Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #1a2a3a;
    --card:   rgba(255,255,255,0.1);
    --border: rgba(255,255,255,0.18);
    --text:   #f0f4ff;
    --muted:  rgba(240,244,255,0.55);
    --accent: #7ecfff;
  }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    color: var(--text);
    background: linear-gradient(160deg, var(--bg), #0d1b2a);
    transition: background 1.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }


  body.clear-day    { --bg: #1a5276; background: linear-gradient(160deg,#1a5276,#d4ac0d); }
  body.clear-night  { --bg: #020814; background: linear-gradient(160deg,#020814,#0d1f3c); }
  body.clouds       { --bg: #2b2d42; background: linear-gradient(160deg,#2b2d42,#555977); }
  body.rain         { --bg: #0d1b2a; background: linear-gradient(160deg,#0d1b2a,#1b3a5c); }
  body.drizzle      { --bg: #1c2e3b; background: linear-gradient(160deg,#1c2e3b,#2e5f80); }
  body.snow         { --bg: #c8d6e5; --text:#1a2a3a; --muted:rgba(20,40,70,0.6); --accent:#3a7fc1; background: linear-gradient(160deg,#c8d6e5,#e8f0f8); }
  body.thunderstorm { --bg: #0a0a12; background: linear-gradient(160deg,#0a0a12,#1a1a30); }
  body.mist         { --bg: #3d4a5c; background: linear-gradient(160deg,#3d4a5c,#7a8a9c); }


  h1 {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 4px;
    color: var(--text);
  }
  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }


  .search-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: 100%;
    max-width: 580px;
    margin-bottom: 16px;
  }

  input[type="text"], select {
    flex: 1;
    min-width: 160px;
    padding: 11px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 40px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    outline: none;
    backdrop-filter: blur(10px);
    transition: border 0.25s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }
  select option { background: #1a2a3a; color: #fff; }

  button {
    padding: 11px 20px;
    border-radius: 40px;
    border: 1px solid var(--border);
    background: rgba(126,207,255,0.15);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: background 0.25s, transform 0.15s;
    white-space: nowrap;
  }
  button:hover { background: rgba(126,207,255,0.28); transform: translateY(-1px); }
  button:active { transform: translateY(0); }


  .unit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .unit-row span { cursor: pointer; font-weight: 600; transition: color 0.2s; }
  .unit-row span.on { color: var(--text); }
  .pill {
    width: 44px; height: 22px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 40px;
    position: relative;
    cursor: pointer;
  }
  .pill::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    transition: transform 0.3s;
  }
  .pill.f::after { transform: translateX(20px); }


  .card {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 16px 60px rgba(0,0,0,0.3);
  }


  .loader { display: none; text-align: center; padding: 50px 0; }
  .loader.show { display: block; }
  .spinner {
    display: inline-block;
    width: 40px; height: 40px;
    border: 3px solid rgba(126,207,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loader p { color: var(--muted); font-size: 0.85rem; margin-top: 14px; }


  .error { display: none; text-align: center; padding: 40px 0; color: #ff8585; }
  .error.show { display: block; }
  .error strong { display: block; font-size: 1.2rem; margin-bottom: 6px; }


  .output { display: none; }
  .output.show { display: block; }

  .city-name {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1.1;
  }
  .country {
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    margin-top: 3px;
  }

  .temp-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 4px;
  }
  .temp-row img {
    width: 72px; height: 72px;
    filter: drop-shadow(0 2px 10px rgba(126,207,255,0.4));
  }
  .big-temp {
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -3px;
    color: var(--text);
  }
  .unit-sym {
    font-size: 2rem;
    font-weight: 300;
    color: var(--muted);
    align-self: flex-start;
    margin-top: 10px;
  }

  .desc {
    font-size: 1rem;
    color: var(--muted);
    text-transform: capitalize;
    margin-bottom: 3px;
  }
  .feels {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 24px;
  }

  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* --- STATS --- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-val {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
  }
  .stat-unit {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* --- SUN ROW --- */
  .sun-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  /* --- FOOTER --- */
  .footer {
    margin-top: 24px;
    font-size: 0.7rem;
    color: rgba(240,244,255,0.25);
    letter-spacing: 1px;
    text-align: center;
  }
  .footer a { color: var(--accent); text-decoration: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 420px) {
    .card { padding: 28px 18px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .big-temp { font-size: 4rem; }
  }
</style>
</head>
<body>

<h1>Atmos</h1>
<p class="subtitle">Live Weather</p>

<!-- SEARCH -->
<div class="search-area">
  <input type="text" id="city-input" placeholder="Type a city name..." />
  <select id="city-select">
    <option value="">Popular cities</option>
    <option value="New York">New York, US</option>
    <option value="London">London, UK</option>
    <option value="Tokyo">Tokyo, Japan</option>
    <option value="Paris">Paris, France</option>
    <option value="Dubai">Dubai, UAE</option>
    <option value="Sydney">Sydney, Australia</option>
    <option value="Mumbai">Mumbai, India</option>
    <option value="Singapore">Singapore</option>
    <option value="Istanbul">Istanbul, Turkey</option>
    <option value="Berlin">Berlin, Germany</option>
  </select>
  <button id="search-btn">Search</button>
  <button id="detect-btn">Detect Location</button>
</div>

<!-- UNIT TOGGLE -->
<div class="unit-row">
  <span id="lbl-c" class="on" onclick="setUnit('metric')">C</span>
  <div class="pill" id="pill" onclick="toggleUnit()"></div>
  <span id="lbl-f" onclick="setUnit('imperial')">F</span>
</div>

<!-- CARD -->
<div class="card">

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Fetching weather...</p>
  </div>

  <div class="error" id="error">
    <strong>Not found</strong>
    <span id="err-text">Please try a different city.</span>
  </div>

  <div class="output" id="output">
    <div class="city-name" id="city-name">--</div>
    <div class="country" id="country">--</div>

    <div class="temp-row">
      <img id="icon" src="" alt="icon" />
      <div class="big-temp" id="temp">--</div>
      <div class="unit-sym" id="unit-sym">C</div>
    </div>

    <div class="desc" id="desc">--</div>
    <div class="feels" id="feels">--</div>

    <hr />

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-val" id="humidity">--</div>
        <div class="stat-unit">%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-val" id="wind">--</div>
        <div class="stat-unit" id="wind-unit">m/s</div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-val" id="visibility">--</div>
        <div class="stat-unit">km</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pressure</div>
        <div class="stat-val" id="pressure">--</div>
        <div class="stat-unit">hPa</div>
      </div>
      <div class="stat">
        <div class="stat-label">Clouds</div>
        <div class="stat-val" id="clouds">--</div>
        <div class="stat-unit">%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind Dir</div>
        <div class="stat-val" id="wind-dir">--</div>
        <div class="stat-unit">direction</div>
      </div>
    </div>

    <div class="sun-row">
      <div class="stat">
        <div class="stat-label">Sunrise</div>
        <div class="stat-val" id="sunrise">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sunset</div>
        <div class="stat-val" id="sunset">--</div>
      </div>
    </div>
  </div>

</div>

<div class="footer">Made by Swayam &mdash; powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a></div>

<script>
  // =============================================
  // REPLACE with your OpenWeatherMap API key
const API_KEY = "e3d1d7cca329dfb38db37626fd9eb29a";
  // =============================================
  const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

  // --- STATE ---
  let unit = 'metric';
  let lastData = null;

  // --- ELEMENTS ---
  const cityInput = document.getElementById('city-input');
  const citySelect = document.getElementById('city-select');
  const searchBtn = document.getElementById('search-btn');
  const detectBtn = document.getElementById('detect-btn');
  const pill = document.getElementById('pill');
  const loader = document.getElementById('loader');
  const error = document.getElementById('error');
  const output = document.getElementById('output');

  // --- UNIT TOGGLE ---
  function toggleUnit() {
    setUnit(unit === 'metric' ? 'imperial' : 'metric');
  }
  function setUnit(u) {
    unit = u;
    pill.classList.toggle('f', u === 'imperial');
    document.getElementById('lbl-c').classList.toggle('on', u === 'metric');
    document.getElementById('lbl-f').classList.toggle('on', u === 'imperial');
    if (lastData) renderWeather(lastData);
  }

  // --- EVENTS ---
  searchBtn.addEventListener('click', () => {
    const city = cityInput.value.trim() || citySelect.value;
    if (!city) return showError('Please enter or select a city.');
    fetchByCity(city);
  });

  cityInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') searchBtn.click();
  });

  citySelect.addEventListener('change', () => {
    if (citySelect.value) {
      cityInput.value = '';
      fetchByCity(citySelect.value);
    }
  });

  detectBtn.addEventListener('click', () => {
    if (!navigator.geolocation) return showError('Geolocation not supported.');
    showLoader();
    navigator.geolocation.getCurrentPosition(
      pos => fetchByCoords(pos.coords.latitude, pos.coords.longitude),
      () => showError('Location permission denied.')
    );
  });

  // --- FETCH ---
  function fetchByCity(city) {
    showLoader();
    fetchWeather(`${BASE_URL}?q=${encodeURIComponent(city)}&units=${unit}&appid=${API_KEY}`);
  }

  function fetchByCoords(lat, lon) {
    fetchWeather(`${BASE_URL}?lat=${lat}&lon=${lon}&units=${unit}&appid=${API_KEY}`);
  }

  async function fetchWeather(url) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error((await res.json()).message || 'City not found.');
      const data = await res.json();
      lastData = data;
      renderWeather(data);
    } catch (e) {
      showError(e.message);
    }
  }

  // --- RENDER ---
  function renderWeather(data) {
    const w = data.weather[0];
    const m = data.main;
    const isMetric = unit === 'metric';

    document.getElementById('city-name').textContent = data.name;
    document.getElementById('country').textContent = data.sys.country || '';
    document.getElementById('temp').textContent = Math.round(m.temp);
    document.getElementById('unit-sym').textContent = isMetric ? 'C' : 'F';
    document.getElementById('icon').src = `https://openweathermap.org/img/wn/${w.icon}@2x.png`;
    document.getElementById('desc').textContent = w.description;
    document.getElementById('feels').textContent =
      `Feels like ${Math.round(m.feels_like)} | High ${Math.round(m.temp_max)} / Low ${Math.round(m.temp_min)}`;

    document.getElementById('humidity').textContent = m.humidity;
    document.getElementById('wind').textContent = (data.wind.speed || 0).toFixed(1);
    document.getElementById('wind-unit').textContent = isMetric ? 'm/s' : 'mph';
    document.getElementById('wind-dir').textContent = degToDir(data.wind.deg || 0);
    document.getElementById('pressure').textContent = m.pressure;
    document.getElementById('clouds').textContent = data.clouds.all;
    document.getElementById('visibility').textContent =
      data.visibility ? (data.visibility / 1000).toFixed(1) : 'N/A';

    const tz = data.timezone;
    document.getElementById('sunrise').textContent = toTime(data.sys.sunrise, tz);
    document.getElementById('sunset').textContent  = toTime(data.sys.sunset,  tz);

    applyTheme(w.id, w.icon);
    showOutput();
  }

  // --- THEME ---
  function applyTheme(id, icon) {
    const night = icon.endsWith('n');
    const themes = ['clear-day','clear-night','clouds','rain','drizzle','snow','thunderstorm','mist'];
    document.body.classList.remove(...themes);

    let t;
    if (id === 800)    t = night ? 'clear-night' : 'clear-day';
    else if (id > 800) t = 'clouds';
    else if (id >= 700) t = 'mist';
    else if (id >= 600) t = 'snow';
    else if (id >= 500) t = 'rain';
    else if (id >= 300) t = 'drizzle';
    else if (id >= 200) t = 'thunderstorm';
    else                t = night ? 'clear-night' : 'clear-day';

    document.body.classList.add(t);
  }

  // --- HELPERS ---
  function degToDir(d) {
    return ['N','NE','E','SE','S','SW','W','NW'][Math.round(d / 45) % 8];
  }
  function toTime(unix, tzOffset) {
    const d = new Date((unix + tzOffset) * 1000);
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' });
  }

  // --- UI STATE ---
  function showLoader() {
    loader.classList.add('show');
    error.classList.remove('show');
    output.classList.remove('show');
  }
  function showError(msg) {
    loader.classList.remove('show');
    output.classList.remove('show');
    error.classList.add('show');
    document.getElementById('err-text').textContent = msg;
  }
  function showOutput() {
    loader.classList.remove('show');
    error.classList.remove('show');
    output.classList.add('show');
  }

  // --- AUTO DETECT ON LOAD ---
  window.addEventListener('load', () => {
    if (navigator.geolocation) {
      showLoader();
      navigator.geolocation.getCurrentPosition(
        pos => fetchByCoords(pos.coords.latitude, pos.coords.longitude),
        () => fetchByCity('London'),
        { timeout: 6000 }
      );
    } else {
      fetchByCity('London');
    }
  });
</script>
</body>
</html>
