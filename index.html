<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atmos</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #1a2a3a;
  --card: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.18);
  --text: #f0f4ff;
  --muted: rgba(240,244,255,0.6);
  --accent: #7ecfff;
}

body {
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  background: linear-gradient(160deg, var(--bg), #0d1b2a);
  overflow: hidden;
}

/* soft animated glow background */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(126,207,255,0.25), transparent 70%);
  top: -120px;
  left: -120px;
  filter: blur(40px);
}

body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(126,207,255,0.15), transparent 70%);
  bottom: -200px;
  right: -200px;
  filter: blur(60px);
}

/* glass card */
.card {
  width: 90%;
  max-width: 520px;
  padding: 50px 40px;
  text-align: center;

  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  backdrop-filter: blur(20px);

  box-shadow: 0 20px 70px rgba(0,0,0,0.35);
  position: relative;
}

/* title */
h1 {
  font-size: 3.2rem;
  font-weight: 800;
  letter-spacing: -2px;
  margin-bottom: 10px;
}

/* subtitle */
p {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 30px;
}

/* icon circle */
.icon {
  width: 90px;
  height: 90px;
  margin: 0 auto 25px;
  border-radius: 50%;
  background: rgba(126,207,255,0.15);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  animation: float 3s ease-in-out infinite;
}

/* button */
.btn {
  display: inline-block;
  padding: 12px 26px;
  margin-top: 10px;
  border-radius: 40px;
  text-decoration: none;

  background: rgba(126,207,255,0.18);
  border: 1px solid var(--border);
  color: var(--text);
  font-weight: 700;

  transition: 0.25s;
}

.btn:hover {
  background: rgba(126,207,255,0.3);
  transform: translateY(-2px);
}

/* small text */
.small {
  margin-top: 20px;
  font-size: 0.75rem;
  color: rgba(240,244,255,0.4);
}

/* animation */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* responsive */
@media (max-width: 420px) {
  h1 { font-size: 2.5rem; }
  .card { padding: 40px 25px; }
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">☁️</div>

  <h1>Atmos</h1>
  <p>Live Weather Intelligence</p>

  <a href="mini.html" class="btn">Enter App</a>

  <div class="small">Clean • Fast • Real-time Weather</div>

</div>

</body>
</html>
